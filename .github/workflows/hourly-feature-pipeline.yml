name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  feature-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run feature pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
          AQI_CITY: Karachi
          AQI_LAT: "24.8607"
          AQI_LON: "67.0011"
          AQI_TIMEZONE: Asia/Karachi
          OPENWEATHER_MAX_RETRIES: "3"
          OPENWEATHER_RETRY_BACKOFF_SECONDS: "1.0"
          HOPSWORKS_FEATURE_STORE_TIMEOUT_SECONDS: "60"
          HOPSWORKS_FEATURE_STORE_MAX_RETRIES: "2"
          HOPSWORKS_INSERT_WAIT_FOR_JOB: "false"
        run: python -m aqi_predictor.pipelines.feature_pipeline
